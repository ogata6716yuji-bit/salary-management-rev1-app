<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Salary Manager</title>
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2E5A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Salary Manager">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700&display=swap" media="print" onload="this.media='all'">
<link rel="stylesheet" href="style.css">
<script>
if (screen.orientation && screen.orientation.unlock) {
  screen.orientation.unlock();
}
</script>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <img src="icon.png" alt="Salary Manager" class="brand-icon">
        <span class="brand-name">SALARY MANAGER</span>
      </div>
      <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">English</button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab active" id="tab-cal" onclick="switchTab('cal')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="tab-cal-lbl">カレンダー</span>
    </button>
    <button class="tab" id="tab-sum" onclick="switchTab('summary')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span id="tab-sum-lbl">月間集計</span>
    </button>
    <button class="tab" id="tab-set" onclick="switchTab('settings')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span id="tab-set-lbl">設定</span>
    </button>
  </div>

  <!-- Calendar Page -->
  <div id="page-cal" class="page active">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-label" id="month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-card">
      <table class="cal">
        <thead><tr id="cal-head"></tr></thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>
    <p class="hint" id="cal-hint">日付をタップしてシフトを追加・編集</p>
  </div>

  <!-- Summary Page -->
  <div id="page-summary" class="page">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-label" id="month-label2"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="metric-grid" id="metrics"></div>
    <div class="card">
      <p class="card-label" id="lbl-breakdown">内訳</p>
      <div id="breakdown-detail"></div>
    </div>
    <div class="card">
      <p class="card-label" id="lbl-shiftlist">シフト一覧</p>
      <table class="list-table">
        <thead><tr id="list-head"></tr></thead>
        <tbody id="shift-list"></tbody>
      </table>
    </div>
    <!-- PDF保存ボタン -->
    <button class="pdf-btn" onclick="exportPDF()" id="pdf-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <span id="pdf-btn-lbl">PDFで保存</span>
    </button>
  </div>

  <!-- Settings Page -->
  <div id="page-settings" class="page">
    <div class="card">
      <p class="card-label" id="lbl-payconf">給与設定</p>
      <div class="form-row"><label id="lbl-rate">時給 (円)</label><input type="number" id="s-rate" value="1100" step="10" min="0"></div>
      <div class="form-row"><label id="lbl-transport">交通費 (円/日)</label><input type="number" id="s-transport" value="0" step="10" min="0"></div>
      <div class="form-row"><label id="lbl-overtime">残業開始 (h)</label><input type="number" id="s-overtime" value="8" step="0.5" min="0"></div>
      <div class="form-row"><label id="lbl-cutoff">締め日</label><select id="s-cutoff"><option value="5">5日</option><option value="10">10日</option><option value="15">15日</option><option value="20">20日</option><option value="25">25日</option><option value="0">月末</option></select></div>
    </div>
    <div class="card">
      <p class="card-label" id="lbl-premconf">割増率</p>
      <div class="form-row"><label id="lbl-night">深夜 (22〜5時)</label><input type="number" id="s-night-rate" value="1.25" step="0.05" min="1"></div>
      <div class="form-row"><label id="lbl-over">残業</label><input type="number" id="s-over-rate" value="1.25" step="0.05" min="1"></div>
    </div>
    <p class="settings-note" id="lbl-note">※ 割増なしの場合は倍率を 1.0 に設定してください</p>
    <!-- リセットボタン -->
    <button class="reset-btn" onclick="confirmReset()" id="reset-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      <span id="reset-btn-lbl">データを一括リセット</span>
    </button>
  </div>

</div>

<!-- シフト入力モーダル -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3 class="modal-title" id="modal-title"></h3>
    <div class="modal-row">
      <label id="m-lbl-start">開始</label>
      <div class="time-inputs">
        <input type="number" id="m-start-h" value="10" min="0" max="23" placeholder="時">
        <span class="time-sep">:</span>
        <input type="number" id="m-start-m" value="0" min="0" max="59" step="5" placeholder="分">
      </div>
    </div>
    <div class="modal-row">
      <label id="m-lbl-end">終了</label>
      <div class="time-inputs">
        <input type="number" id="m-end-h" value="18" min="0" max="23" placeholder="時">
        <span class="time-sep">:</span>
        <input type="number" id="m-end-m" value="0" min="0" max="59" step="5" placeholder="分">
      </div>
    </div>
    <div class="modal-row"><label id="m-lbl-break">休憩 (分)</label><input type="number" id="m-break" value="0" min="0" step="15"></div>
    <div class="modal-btns">
      <button class="btn-save" id="m-btn-save" onclick="saveShift()">保存</button>
      <button class="btn-del" id="modal-del" onclick="deleteShift()" style="display:none;">削除</button>
      <button class="btn-cancel" id="m-btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- リセット確認モーダル -->
<div class="modal-overlay" id="reset-modal" onclick="handleResetOverlayClick(event)">
  <div class="modal">
    <h3 class="modal-title" id="reset-modal-title">データを一括リセット</h3>
    <p id="reset-modal-msg" style="font-size:14px;color:var(--text-muted);margin-bottom:1.25rem;line-height:1.6;">全てのシフトデータを削除します。この操作は取り消せません。本当にリセットしますか？</p>
    <div class="modal-btns">
      <button class="btn-del" id="reset-confirm-btn" onclick="executeReset()">リセット</button>
      <button class="btn-cancel" id="reset-cancel-btn" onclick="closeResetModal()">キャンセル</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
window.addEventListener('load', () => {
  if (screen.orientation && screen.orientation.unlock) {
    screen.orientation.unlock();
  }
});
</script>
</body>
</html>
